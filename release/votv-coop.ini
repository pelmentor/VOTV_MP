; ==============================================================
;   Voices of the Void  --  CO-OP MOD  (votv-coop)
;   This file lives next to VotV-Win64-Shipping.exe.
;   The only thing most players ever edit is the name below.
; ==============================================================

; ---------------------- MULTIPLAYER ---------------------------
[net]

; Your player name -- shown in the server browser, the chat and
; above your head. Can also be changed in game (MULTIPLAYER menu).
net.nick=Pelmentor

; Master server: the public lobby list the MULTIPLAYER menu uses.
; DEFAULT = the official server. To run your own master instead, set
; net.master.custom=1 and put its host:port here.
net.master=DEFAULT

; UDP port used when hosting. Change only if something else on
; your machine already uses it.
net.port=47621

; ----- Advanced: direct LAN connection (no browser) -----------
; Normally NOT needed -- host and join through the in-game
; MULTIPLAYER menu instead. For a pure-LAN direct connect,
; uncomment on the joining machine:
;net.role=client
;net.peer=192.168.1.10:47621


; --------------------------------------------------------------
; Developer switches. Not interesting unless you are debugging
; the mod; 0 keeps every dev tool off.
[dev]
enabled=0
; L1 pile-orphan census detail: 1 = per-orphan [PILE-CENSUS] + [PILE-DELTA] divergence deltas
; (the [PILE-CENSUS] summary is always logged). 0 (default) = summary only.
;pile_delta_probe=0
