name: Release

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
              echo "Dry run, using placeholder version 0.0.0-dev"
              exit 0
          fi
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag '$tag' is not Thunderstore-compatible. Expected X.Y.Z (optionally v-prefixed)." >&2
              exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync Cargo manifest version to release version
        run: |
          version="${{ steps.version.outputs.version }}"
          sed -i '/^\[package\]/,/^\[/ { /^version = / s/".*"/"'"$version"'"/ }' Cargo.toml
          sed -i '/^name = "unreal-shimloader"/,/^version/ { /^version = / s/".*"/"'"$version"'"/ }' Cargo.lock
          echo "Cargo.toml: $(grep -m1 '^version = ' Cargo.toml)"
          echo "Cargo.lock: $(grep -A1 '^name = "unreal-shimloader"' Cargo.lock | tail -n 1)"

      - name: Build
        run: cargo build --release --locked

      - name: Decode signing cert
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        run: echo "$SM_CLIENT_CERT_FILE_B64" | base64 --decode > "$RUNNER_TEMP/Certificate_pkcs12.p12"

      - name: Install DigiCert SSM tools
        uses: digicert/ssm-code-signing@v1.1.0
        env:
          SM_HOST: ${{ secrets.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}/Certificate_pkcs12.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: Sign dwmapi.dll
        env:
          SM_HOST: ${{ secrets.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}/Certificate_pkcs12.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
        run: |
          smctl sign \
              --keypair-alias "${{ secrets.SM_KEYPAIR_ALIAS }}" \
              --input "target/release/dwmapi.dll" \
              --verbose
          smctl sign verify --input "target/release/dwmapi.dll"

      - name: Package shimloader binary zip
        run: |
          version="${{ steps.version.outputs.version }}"
          (cd target/release && 7z a -tzip "../../unreal_shimloader-$version.zip" dwmapi.dll)

      - name: Package Thunderstore zip
        run: |
          version="${{ steps.version.outputs.version }}"
          stage=ts-stage
          mkdir "$stage"
          cp ts/icon.png "$stage/"
          cp README.md "$stage/"
          cp -r ts/UE4SS "$stage/"
          cp target/release/dwmapi.dll "$stage/"
          cat > "$stage/manifest.json" <<EOF
          {
              "name": "unreal_shimloader",
              "author": "Thunderstore",
              "version_number": "$version",
              "website_url": "https://github.com/thunderstore-io/unreal-shimloader",
              "description": "Thunderstore Mod Manager and r2modmanPlus support for RE-UE4SS.",
              "dependencies": []
          }
          EOF
          (cd "$stage" && 7z a -tzip "../Thunderstore-unreal_shimloader-$version.zip" .)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.version.outputs.version }}
          path: |
            target/release/dwmapi.dll
            unreal_shimloader-*.zip
            Thunderstore-unreal_shimloader-*.zip
          retention-days: 14

      - name: Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "$GITHUB_REF_NAME" \
              "unreal_shimloader-$version.zip" \
              "Thunderstore-unreal_shimloader-$version.zip" \
              --generate-notes
